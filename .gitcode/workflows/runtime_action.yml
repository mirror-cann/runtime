name: runtime_action

concurrency:
  max: 5
  exceed-action: QUEUE
  enable: true
  preemption:
    enable: true
    events: [mr_id]

on:
  workflow_dispatch:
  pull_request_comment:
    types: [created]
    branches: [ '*' ]
    comments: [ '^(?:\/)?compile*' ]
  pr_comment:
    types: [ created ]
    keyword: '^(?:\/)?compile*'

env:
  org_name: "cann"
  repo_name: "runtime"
  MERGE_ID: ${{atomgit.event.pull_request.number}}
  TARGET_BRANCH: ${{atomgit.base_ref}}
  SOURCE_BRANCH: ${{atomgit.head_ref}}
  obs_path: "${{ vars.OBS_PATH }}/${{ env.MERGE_ID }}"
  obs_smoke_path: "${{ env.obs_path }}/presmoke/2"

stages:
  stage1:
    name: image
    select: selected_by_default
    jobs:
      JOB_image:
        name: image
        select: selected_by_default
        needs: []
        steps:
          - name: revise_image
            identifier: revise_image
            uses: cann/.gitcode/actions/revise-img@master
            with:
              repo_name: 'runtime'
              target_branch: ${{ env.TARGET_BRANCH }}
              repo_url: ${{ vars.CI_PATH }}
          -
            name: show_output
            run: |
              echo "image: ${{ steps.revise_image.outputs.Compile_Ascend_X86  }}"
        if: "${{ default() }}"
        runs-on: ["codearts-hosted", "ubuntu-latest", "x64", "large"]
      JOB_pr:
        name: get_pr_files
        select: selected_by_default
        needs: []
        steps:
          -
            name: Checkout
            identifier: process_checkout
            uses: checkout
            with:
              ref: ${{ atomgit.event.pull_request.merge_commit_sha || atomgit.sha }}
              token: ${{secrets.GIT_TOKEN}}
          -
            name: get_pr
            identifier: get_pr
            uses: cann/.gitcode/actions/get-pr@master
            with:
              workspace: ${{ steps.process_checkout.outputs.path }}
              target_branch: ${{ env.TARGET_BRANCH }}
              git_token: ${{secrets.GIT_TOKEN}}
          -
            name: upload
            uses: obs-upload
            with:
              endpoint: "https://obs.cn-north-4.myhuaweicloud.com"
              bucket: "ascend-ci"
              access-key: ${{secrets.AK}}
              secret-key: ${{secrets.SK}}
              artifact-path: |
                ${{ steps.process_checkout.outputs.path }}/pr_filelist.txt
                ${{ steps.process_checkout.outputs.path }}/pr_filelist_mod.txt
                ${{ steps.process_checkout.outputs.path }}/pr_filelist_precommit.txt
                ${{ steps.process_checkout.outputs.path }}/update_file_detail.txt
              object-prefix: ${{ env.obs_path }}/
        if: "${{ default() }}"
        runs-on:
        - default
      JOB_shell:
        name: get_shell_files
        select: selected_by_default
        needs: []
        steps:
          -
            name: Checkout
            identifier: process_checkout
            uses: checkout
            with:
              ref: master
              token: ${{secrets.GIT_TOKEN}}
          -
            name: upload
            uses: obs-upload
            with:
              endpoint: "https://obs.cn-north-4.myhuaweicloud.com"
              bucket: "ascend-ci"
              access-key: ${{secrets.AK}}
              secret-key: ${{secrets.SK}}
              artifact-path: |
                ${{ steps.process_checkout.outputs.path }}/.gitcode/scripts/*
              object-prefix: ${{ env.obs_path }}/
        if: "${{ default() }}"
        runs-on:
        - default
    pre:
    - type: auto
    fail-fast: true
  stage2:
    name: compile
    select: selected_by_default
    jobs:
      JOB_x86_compile_ubuntu24:
        name: x86_compile_ubuntu24
        select: selected_by_default
        needs: []
        uses: .gitcode/workflows/x86_compile_action.yml
        with:
          task_name: 'compile_x86_ubuntu24'
          image_version: ${{ jobs.JOB_image.outputs.Compile_Ascend_X86_ubuntu24 }}
      JOB_x86_compile:
        name: x86_compile
        select: selected_by_default
        needs: []
        uses: .gitcode/workflows/x86_compile_action.yml
        with:
          task_name: 'compile_x86'
          image_version: ${{ jobs.JOB_image.outputs.Compile_Ascend_X86 }}
      JOB_arm_compile:
        name: arm_compile
        select: selected_by_default
        needs: []
        uses: .gitcode/workflows/arm_compile_action.yml
        with:
          task_name: 'arm'
          image_version: ${{ jobs.JOB_image.outputs.Compile_Ascend_ARM }}
      JOB_arm_compile_ubuntu24:
        name: arm_compile_ubuntu24
        select: selected_by_default
        needs: []
        uses: .gitcode/workflows/arm_compile_action.yml
        with:
          task_name: 'arm_ubuntu24'
          image_version: ${{ jobs.JOB_image.outputs.Compile_Ascend_ARM_ubuntu24 }}
      JOB_codecheck_action:
        name: codecheck_action
        select: selected_by_default
        needs: []
        uses: .gitcode/workflows/codecheck_action.yml
      JOB_staticcheck_markdown:
        name: staticcheck_markdown
        select: selected_by_default
        needs: []
        uses: .gitcode/workflows/staticcheck_action.yml
        with:
          check_type: 'markdown'
      JOB_staticcheck_codespell_check:
        name: staticcheck_codespell_check
        select: selected_by_default
        needs: []
        uses: .gitcode/workflows/staticcheck_action.yml
        with:
          check_type: 'codespell_check'
      JOB_staticcheck_tag_closed_check:
        name: staticcheck_tag_closed_check
        select: selected_by_default
        needs: []
        uses: .gitcode/workflows/staticcheck_action.yml
        with:
          check_type: 'tag_closed_check'
      JOB_staticcheck_resource_existence_check:
        name: staticcheck_resource_existence_check
        select: selected_by_default
        needs: []
        uses: .gitcode/workflows/staticcheck_action.yml
        with:
          check_type: 'resource_existence_check'
      JOB_staticcheck_link_validity_check:
        name: staticcheck_link_validity_check
        select: selected_by_default
        needs: []
        uses: .gitcode/workflows/staticcheck_action.yml
        with:
          check_type: 'link_validity_check'
    pre:
    - type: auto
  stage3:
    name: ut
    select: selected_by_default
    jobs:
      JOB_ut_acl:
        name: ut_test_acl
        select: selected_by_default
        needs: []
        uses: .gitcode/workflows/llt_action.yml
        with:
          ut_type: 'acl'
          image_version: ${{ jobs.JOB_image.outputs.UT_Test_acl }}
      JOB_ut_platform:
        name: ut_test_platform
        select: selected_by_default
        needs: []
        uses: .gitcode/workflows/llt_action.yml
        with:
          ut_type: 'platform'
          image_version: ${{ jobs.JOB_image.outputs.UT_Test_platform }}
      JOB_ut_qs:
        name: ut_test_qs
        select: selected_by_default
        needs: []
        uses: .gitcode/workflows/llt_action.yml
        with:
          ut_type: 'qs'
          image_version: ${{ jobs.JOB_image.outputs.UT_Test_qs }}
      JOB_ut_aicpusd:
        name: ut_test_aicpusd
        select: selected_by_default
        needs: []
        uses: .gitcode/workflows/llt_action.yml
        with:
          ut_type: 'aicpusd'
          image_version: ${{ jobs.JOB_image.outputs.UT_Test_aicpusd }}
      JOB_ut_tsd:
        name: ut_test_tsd
        select: selected_by_default
        needs: []
        uses: .gitcode/workflows/llt_action.yml
        with:
          ut_type: 'tsd'
          image_version: ${{ jobs.JOB_image.outputs.UT_Test_tsd }}
      JOB_ut_mmpa:
        name: ut_test_mmpa
        select: selected_by_default
        needs: []
        uses: .gitcode/workflows/llt_action.yml
        with:
          ut_type: 'mmpa'
          image_version: ${{ jobs.JOB_image.outputs.UT_Test_mmpa }}
      JOB_ut_rts_v201:
        name: ut_test_rts_v201
        select: selected_by_default
        needs: []
        uses: .gitcode/workflows/llt_action.yml
        with:
          ut_type: 'rts_v201'
          ut_package: 'coverage_*.info'
          image_version: ${{ jobs.JOB_image.outputs.UT_Test_rts_v201 }}
      JOB_ut_rts_david:
        name: ut_test_rts_david
        select: selected_by_default
        needs: []
        uses: .gitcode/workflows/llt_action.yml
        with:
          ut_type: 'rts_david'
          ut_package: 'coverage_*.info'
          image_version: ${{ jobs.JOB_image.outputs.UT_Test_rts_david }}
      JOB_ut_rts_910b:
        name: ut_test_rts_910b
        select: selected_by_default
        needs: []
        uses: .gitcode/workflows/llt_action.yml
        with:
          ut_type: 'rts_910b'
          ut_package: 'coverage_*.info'
          image_version: ${{ jobs.JOB_image.outputs.UT_Test_rts_910b }}
      JOB_ut_rts_common:
        name: ut_test_rts_common
        select: selected_by_default
        needs: []
        uses: .gitcode/workflows/llt_action.yml
        with:
          ut_type: 'rts_common'
          ut_package: 'coverage_*.info'
          image_version: ${{ jobs.JOB_image.outputs.UT_Test_rts_common }}
      JOB_ut_rts_c:
        name: ut_test_rts_c
        select: selected_by_default
        needs: []
        uses: .gitcode/workflows/llt_action.yml
        with:
          ut_type: 'rts_c'
          image_version: ${{ jobs.JOB_image.outputs.UT_Test_rts_c }}
      JOB_ut_dfx_error_manager:
        name: ut_test_dfx_error_manager
        select: selected_by_default
        needs: []
        uses: .gitcode/workflows/llt_action.yml
        with:
          ut_type: 'dfx_error_manager'
          image_version: ${{ jobs.JOB_image.outputs.UT_Test_dfx }}
      JOB_ut_dfx_log:
        name: ut_test_dfx_log
        select: selected_by_default
        needs: []
        uses: .gitcode/workflows/llt_action.yml
        with:
          ut_type: 'dfx_log'
          image_version: ${{ jobs.JOB_image.outputs.UT_Test_dfx }}
      JOB_ut_dfx_trace:
        name: ut_test_dfx_trace
        select: selected_by_default
        needs: []
        uses: .gitcode/workflows/llt_action.yml
        with:
          ut_type: 'dfx_trace'
          image_version: ${{ jobs.JOB_image.outputs.UT_Test_dfx }}
      JOB_ut_dfx_msprof_part1:
        name: ut_test_dfx_msprof_part1
        select: selected_by_default
        needs: []
        uses: .gitcode/workflows/llt_action.yml
        with:
          ut_type: 'dfx_msprof_part1'
          ut_package: 'coverage_*.info'
          image_version: ${{ jobs.JOB_image.outputs.UT_Test_dfx }}
      JOB_ut_dfx_msprof_part2:
        name: ut_test_dfx_msprof_part2
        select: selected_by_default
        needs: []
        uses: .gitcode/workflows/llt_action.yml
        with:
          ut_type: 'dfx_msprof_part2'
          ut_package: 'coverage_*.info'
          image_version: ${{ jobs.JOB_image.outputs.UT_Test_dfx }}
      JOB_ut_dfx_adump:
        name: ut_test_dfx_adump
        select: selected_by_default
        needs: []
        uses: .gitcode/workflows/llt_action.yml
        with:
          ut_type: 'dfx_adump'
          image_version: ${{ jobs.JOB_image.outputs.UT_Test_dfx }}
      JOB_ut_camodel:
        name: ut_test_camodel
        select: selected_by_default
        needs: []
        uses: .gitcode/workflows/llt_action.yml
        with:
          ut_type: 'camodel'
          image_version: ${{ jobs.JOB_image.outputs.UT_Test_camodel }}
    pre:
    - type: auto
  stage4:
    name: ut_report
    select: selected_by_default
    jobs:
      JOB_ut_report_rts:
        name: ut_report_rts
        select: selected_by_default
        needs: []
        steps:
          -
            name: Checkout
            identifier: process_checkout
            uses: checkout
            with:
              ref: ${{ atomgit.event.pull_request.merge_commit_sha || atomgit.sha }}
              token: ${{secrets.GIT_TOKEN}}
          -
            name: download
            uses: obs-download
            with:
              endpoint: "https://obs.cn-north-4.myhuaweicloud.com"
              bucket: "ascend-ci"
              key: |
                ${{ env.obs_path }}/pr_filelist.txt
                ${{ env.obs_path }}/pr_filelist_mod.txt
              path: ${{ steps.process_checkout.outputs.path }}
          -
            name: ut_report
            identifier: ut-report
            uses: cann/.gitcode/actions/ut-cov-report@master
            with:
              workspace: ${{ steps.process_checkout.outputs.path }}
              cov_mode: "report"
              ut_field: "rts_common"
              modules: "rts_v201 rts_david rts_910b rts_common"
              source_branch: ${{ env.SOURCE_BRANCH }}
              target_branch: ${{ env.TARGET_BRANCH }}
              obs_path: ${{ env.obs_path }}
              git_token: ${{secrets.GIT_TOKEN}}
          -
            name: upload
            uses: obs-upload
            with:
              endpoint: "https://obs.cn-north-4.myhuaweicloud.com"
              bucket: "ascend-ci"
              access-key: ${{secrets.AK}}
              secret-key: ${{secrets.SK}}
              artifact-path: |
                ${{ steps.process_checkout.outputs.path }}/ut_cov_*.tar.gz
              object-prefix: ${{ env.obs_path }}/
        if: env.TARGET_BRANCH == 'master'
        runs-on: [dedicate-hosted, x64, large]
        container:
          image: swr.cn-north-4.myhuaweicloud.com/ci_cann/ubuntu24.04_x86:lv6_v1.1073
      JOB_ut_report_dfx_msprof:
        name: ut_report_dfx_msprof
        select: selected_by_default
        needs: []
        steps:
          -
            name: Checkout
            identifier: process_checkout
            uses: checkout
            with:
              ref: ${{ atomgit.event.pull_request.merge_commit_sha || atomgit.sha }}
              token: ${{secrets.GIT_TOKEN}}
          -
            name: download
            uses: obs-download
            with:
              endpoint: "https://obs.cn-north-4.myhuaweicloud.com"
              bucket: "ascend-ci"
              key: |
                ${{ env.obs_path }}/pr_filelist.txt
                ${{ env.obs_path }}/pr_filelist_mod.txt
              path: ${{ steps.process_checkout.outputs.path }}
          -
            name: ut_report
            identifier: ut-report
            uses: cann/.gitcode/actions/ut-cov-report@master
            with:
              workspace: ${{ steps.process_checkout.outputs.path }}
              cov_mode: "report"
              ut_field: "dfx_msprof"
              modules: "dfx_msprof_part1 dfx_msprof_part2"
              source_branch: ${{ env.SOURCE_BRANCH }}
              target_branch: ${{ env.TARGET_BRANCH }}
              obs_path: ${{ env.obs_path }}
              git_token: ${{secrets.GIT_TOKEN}}
          -
            name: upload
            uses: obs-upload
            with:
              endpoint: "https://obs.cn-north-4.myhuaweicloud.com"
              bucket: "ascend-ci"
              access-key: ${{secrets.AK}}
              secret-key: ${{secrets.SK}}
              artifact-path: |
                ${{ steps.process_checkout.outputs.path }}/ut_cov_*.tar.gz
              object-prefix: ${{ env.obs_path }}/
        if: env.TARGET_BRANCH == 'master'
        runs-on: [dedicate-hosted, x64, large]
        container:
          image: swr.cn-north-4.myhuaweicloud.com/ci_cann/ubuntu24.04_x86:lv6_v1.1073
    pre:
    - type: auto
    fail-fast: true
  stage5:
    name: PreSmoke
    jobs:
      A2_smoke:
        name: A2_pre_smoke
        steps:
          -
            name: Checkout
            identifier: process_checkout
            uses: checkout
            with:
              token: ${{secrets.GIT_TOKEN}}
              path: "./runner"
          -
            name: Checkout gitcode
            identifier: process_checkout_gitcode
            uses: checkout
            with:
              repository: "https://gitcode.com/cann/.gitcode.git"
              ref: master
              path: "./runner/ci"
          - name: download run file
            identifier: process_download
            uses: obs-download
            with:
              endpoint: "obs.cn-north-4.myhuaweicloud.com"
              bucket: "ascend-ci"
              key: "${{jobs.JOB_arm_compile_ubuntu24.outputs.arm_run_key}}"
              path: ${{ steps.process_checkout.outputs.path }}
          -
            name: download
            uses: obs-download
            with:
              endpoint: "https://obs.cn-north-4.myhuaweicloud.com"
              bucket: "ascend-ci"
              access-key: ${{ secrets.AK }}
              secret-key: ${{ secrets.SK }}
              key: |
                ${{ env.obs_path }}/pr_filelist.txt
                ${{ env.obs_path }}/pr_filelist_mod.txt
                ${{ env.obs_path }}/update_file_detail.txt
                ${{ env.obs_path }}/pre_smoke.sh
              path: ${{ steps.process_checkout.outputs.path }}
          -
            name: tar businesscode
            run: |
              cd ${{ steps.process_checkout.outputs.path }}
              tar -zcf ../smoke_data.tar.gz .
              mv ../smoke_data.tar.gz ./
          -
            name: upload
            identifier: process_upload
            uses: obs-upload
            with:
              endpoint: "https://obs.cn-north-4.myhuaweicloud.com"
              bucket: "ascend-ci"
              access-key: ${{secrets.AK}}
              secret-key: ${{secrets.SK}}
              artifact-path: |
                ${{ steps.process_checkout.outputs.path }}/smoke_data.tar.gz
              object-prefix: ${{ env.obs_smoke_path }}/
          -
            name: smoke executor
            uses: manifest-management-plugin
            with:
              action: DEPLOY
              repo: ${{ steps.process_checkout.outputs.path }}
              file_path: ${{ steps.process_checkout.outputs.path }}/ci/smoke-conf/smoke-A2.yaml
              manifest_image: swr.cn-south-1.myhuaweicloud.com/pre_smoke/${{ jobs.JOB_image.outputs.Smoke_A900_npupool }}
              custom_shell_script: |-
                set -e
                # set env
                export download_path=${{ steps.process_download.outputs.download-path }}
                export repo_name=${{env.repo_name}}
                export pr_id=${{ env.MERGE_ID }}
                export AK=${{secrets.AK}}
                export SK=${{secrets.SK}}
                mkdir -p /home/taskspace && cd /home/taskspace
                wget -nv ${{ steps.process_upload.outputs.primary-url }}
                tar -zxf $(basename "${{ steps.process_upload.outputs.primary-url }}")
                bash /home/taskspace/pre_smoke.sh
          -
            name: smoke resource clean
            uses: manifest-management-plugin
            with:
              action: CRUSH
              repo: ${{ steps.process_checkout.outputs.path }}
              file_path: ${{ steps.process_checkout.outputs.path }}/ci/smoke-conf/smoke-A2.yaml
        if: "${{ default() }}"
        runs-on: ['self-hosted','arch=arm','smoke=204']
    pre:
    - type: auto
    fail-fast: true
